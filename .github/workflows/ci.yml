name: ci

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APP_ENV: development
      APP_PASSWORD: ci-test-password
      FLUX_PASSWORD: ci-test-password
      DATABASE_URL: postgres://flux:flux@127.0.0.1:5432/flux?sslmode=disable
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flux
          POSTGRES_PASSWORD: flux
          POSTGRES_DB: flux
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U flux -d flux"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Verify formatting context
        run: go version

      - name: Verify workflows
        run: bash ./scripts/verify-workflows.sh

      - name: Verify Go lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0
          args: --timeout=5m

      - name: Verify Go
        run: bash ./scripts/verify-go.sh

      - name: Verify Go race
        run: bash ./scripts/verify-go-race.sh

      - name: Verify web scaffold
        run: bash ./scripts/verify-web.sh

      - name: Verify release artifact parity
        env:
          RELEASE_RUN_SMOKE: "0"
        run: bash ./scripts/release-dry-run.sh

      - name: Verify Docker image build
        run: docker build -t flux-board:ci .

      - name: Verify docker compose contract
        run: docker compose -f docker-compose.yml config >/dev/null

  docker_smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        mode:
          - name: login
            smoke_script: smoke:login
            app_password: ci-test-password
            flux_password: ci-test-password
            flux_setup_password: ci-test-password
          - name: setup
            smoke_script: smoke:setup
            app_password: ""
            flux_password: ci-bootstrap-password
            flux_setup_password: ci-bootstrap-password
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APP_ENV: development
      APP_PASSWORD: ${{ matrix.mode.app_password }}
      FLUX_PASSWORD: ${{ matrix.mode.flux_password }}
      FLUX_SETUP_PASSWORD: ${{ matrix.mode.flux_setup_password }}
      DATABASE_URL: postgres://flux:flux@127.0.0.1:5432/flux?sslmode=disable
      DOCKER_DATABASE_URL: postgres://flux:flux@host.docker.internal:5432/flux?sslmode=disable
      BASE_URL: http://127.0.0.1:8080
      SMOKE_TIMEOUT_MS: "120000"
      PLAYWRIGHT_BROWSER: chromium
      SMOKE_SCRIPT: ${{ matrix.mode.smoke_script }}
      TEST_RESULTS_DIR: test-results/github-ci/docker-smoke/${{ matrix.mode.name }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flux
          POSTGRES_PASSWORD: flux
          POSTGRES_DB: flux
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U flux -d flux"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install root smoke dependencies
        run: npm ci --no-fund --no-audit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify Docker runtime smoke
        run: bash ./scripts/verify-docker-smoke.sh

      - name: Upload Docker diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-docker-smoke-${{ matrix.mode.name }}
          path: |
            test-results/
          if-no-files-found: ignore

  smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser:
          - chromium
          - firefox
          - webkit
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APP_ENV: development
      APP_PASSWORD: ci-test-password
      FLUX_PASSWORD: ci-test-password
      DATABASE_URL: postgres://flux:flux@127.0.0.1:5432/flux?sslmode=disable
      BASE_URL: http://127.0.0.1:8080
      SMOKE_TIMEOUT_MS: "120000"
      PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
      TEST_RESULTS_DIR: test-results/github-ci/${{ matrix.browser }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flux
          POSTGRES_PASSWORD: flux
          POSTGRES_DB: flux
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U flux -d flux"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install root smoke dependencies
        run: npm ci --no-fund --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Verify browser smoke
        run: bash ./scripts/verify-smoke.sh

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ matrix.browser }}
          path: |
            test-results/
          if-no-files-found: ignore

  setup_smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APP_ENV: development
      APP_PASSWORD: ""
      FLUX_PASSWORD: ci-bootstrap-password
      FLUX_SETUP_PASSWORD: ci-bootstrap-password
      DATABASE_URL: postgres://flux:flux@127.0.0.1:5432/flux?sslmode=disable
      BASE_URL: http://127.0.0.1:8080
      SMOKE_TIMEOUT_MS: "120000"
      PLAYWRIGHT_BROWSER: chromium
      TEST_RESULTS_DIR: test-results/github-ci/setup-smoke/chromium
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flux
          POSTGRES_PASSWORD: flux
          POSTGRES_DB: flux
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U flux -d flux"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install root smoke dependencies
        run: npm ci --no-fund --no-audit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify root setup smoke
        run: bash ./scripts/verify-setup-smoke.sh

      - name: Upload setup diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-setup-smoke-chromium
          path: |
            test-results/
          if-no-files-found: ignore

  settings_smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APP_ENV: development
      APP_PASSWORD: ci-test-password
      FLUX_PASSWORD: ci-test-password
      DATABASE_URL: postgres://flux:flux@127.0.0.1:5432/flux?sslmode=disable
      BASE_URL: http://127.0.0.1:8080
      SMOKE_TIMEOUT_MS: "180000"
      PLAYWRIGHT_BROWSER: chromium
      TEST_RESULTS_DIR: test-results/github-ci/settings-smoke/chromium
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flux
          POSTGRES_PASSWORD: flux
          POSTGRES_DB: flux
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U flux -d flux"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install root smoke dependencies
        run: npm ci --no-fund --no-audit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify settings smoke
        run: bash ./scripts/verify-settings-smoke.sh

      - name: Upload settings diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-settings-smoke-chromium
          path: |
            test-results/
          if-no-files-found: ignore

  dnd_smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser:
          - chromium
          - firefox
          - webkit
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APP_ENV: development
      APP_PASSWORD: ci-test-password
      FLUX_PASSWORD: ci-test-password
      DATABASE_URL: postgres://flux:flux@127.0.0.1:5432/flux?sslmode=disable
      BASE_URL: http://127.0.0.1:8080
      SMOKE_TIMEOUT_MS: "120000"
      PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
      TEST_RESULTS_DIR: test-results/github-ci/dnd-smoke/${{ matrix.browser }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flux
          POSTGRES_PASSWORD: flux
          POSTGRES_DB: flux
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U flux -d flux"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install root smoke dependencies
        run: npm ci --no-fund --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Verify drag-and-drop smoke
        run: bash ./scripts/verify-dnd-smoke.sh

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-dnd-smoke-${{ matrix.browser }}
          path: |
            test-results/
          if-no-files-found: ignore

  keyboard_smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser:
          - chromium
          - firefox
          - webkit
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APP_ENV: development
      APP_PASSWORD: ci-test-password
      FLUX_PASSWORD: ci-test-password
      DATABASE_URL: postgres://flux:flux@127.0.0.1:5432/flux?sslmode=disable
      BASE_URL: http://127.0.0.1:8080
      SMOKE_TIMEOUT_MS: "120000"
      PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
      TEST_RESULTS_DIR: test-results/github-ci/keyboard-smoke/${{ matrix.browser }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flux
          POSTGRES_PASSWORD: flux
          POSTGRES_DB: flux
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U flux -d flux"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install root smoke dependencies
        run: npm ci --no-fund --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Verify board keyboard smoke
        run: bash ./scripts/verify-board-keyboard-smoke.sh

      - name: Upload keyboard diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-keyboard-smoke-${{ matrix.browser }}
          path: |
            test-results/
          if-no-files-found: ignore

  preview_smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APP_ENV: development
      APP_PASSWORD: ci-test-password
      FLUX_PASSWORD: ci-test-password
      DATABASE_URL: postgres://flux:flux@127.0.0.1:5432/flux?sslmode=disable
      BASE_URL: http://127.0.0.1:8080
      PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
      TEST_RESULTS_DIR: test-results/github-ci/next-preview-${{ matrix.browser }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flux
          POSTGRES_PASSWORD: flux
          POSTGRES_DB: flux
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U flux -d flux"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install root smoke dependencies
        run: npm ci --no-fund --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Verify next alias redirect and legacy rollback route
        run: bash ./scripts/verify-next-preview.sh

      - name: Upload preview diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-next-preview-${{ matrix.browser }}
          path: |
            test-results/
          if-no-files-found: ignore

  release_dry_run:
    if: github.event_name == 'workflow_dispatch'
    needs:
      - verify
      - docker_smoke
      - smoke
      - setup_smoke
      - settings_smoke
      - dnd_smoke
      - keyboard_smoke
      - preview_smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      APP_ENV: development
      APP_PASSWORD: ci-test-password
      FLUX_PASSWORD: ci-test-password
      DATABASE_URL: postgres://flux:flux@127.0.0.1:5432/flux?sslmode=disable
      BASE_URL: http://127.0.0.1:8080
      PLAYWRIGHT_BROWSER: chromium
      RELEASE_OUTPUT_DIR: test-results/release/github-dry-run
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flux
          POSTGRES_PASSWORD: flux
          POSTGRES_DB: flux
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U flux -d flux"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install root smoke dependencies
        run: npm ci --no-fund --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run release dry run
        run: bash ./scripts/release-dry-run.sh

      - name: Upload release dry-run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-linux-amd64
          path: |
            test-results/release/github-dry-run/
          if-no-files-found: error
