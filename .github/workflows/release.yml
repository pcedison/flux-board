name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate VERSION, tag, and changelog
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-meta
          RELEASE_TAG="${GITHUB_REF_NAME}" RELEASE_NOTES_OUTPUT="release-meta/release-notes.md" bash ./scripts/validate-release.sh > "release-meta/version.txt"
          version="$(tr -d '\r\n' < release-meta/version.txt)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release-meta/
          if-no-files-found: error

  build:
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            extension: ""
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            extension: ""
          - runner: windows-latest
            goos: windows
            goarch: amd64
            extension: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build versioned release artifact
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          dist_dir="dist"
          artifact_stem="flux-board-v${RELEASE_VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          binary_name="${artifact_stem}${{ matrix.extension }}"
          mkdir -p "$dist_dir"
          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" go build -trimpath -o "$dist_dir/$binary_name" ./cmd/flux-board
          (
            cd "$dist_dir"
            sha256sum "$binary_name" > "$binary_name.sha256"
          )

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: release-assets

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*-*
          merge-multiple: true

      - name: Create consolidated checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -maxdepth 1 -type f -name '*.sha256' -print0 | sort -z | xargs -0 cat > release-assets/SHA256SUMS
          test -s release-assets/SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Flux Board v${{ needs.validate.outputs.version }}
          body_path: release-assets/release-notes.md
          files: |
            release-assets/flux-board-v*
            release-assets/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: false
