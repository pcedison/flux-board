services:
  - type: web
    name: flux-board
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "8080"
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: APP_PASSWORD
        sync: false
